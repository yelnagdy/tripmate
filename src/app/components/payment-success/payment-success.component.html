<div class="success-page">
  <div class="success-card">

    <!-- Decorative stars arc -->
    <div class="stars-ring" aria-hidden="true">
      <span class="cstar cs1">✦</span>
      <span class="cstar cs2">✦</span>
      <span class="cstar cs3">✦</span>
      <span class="cstar cs4">✦</span>
      <span class="cstar cs5">✦</span>
      <span class="cstar cs6">✦</span>
      <span class="cstar cs7">✦</span>
      <span class="cstar cs8">✦</span>

    <h1 class="congrats-title">Congratulations!</h1>

      View My Trips

  </div>
</div>
