[build]
  command = "ng build"
  publish = "dist/tripmate/browser"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the live backend
[[redirects]]
  from   = "/api/*"
  to     = "http://tripmate.runasp.net/api/:splat"
  status = 200
  force  = true

# Angular SPA — all client-side routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
